
services:
  # ─────────────────────────────────────────────
  # CockroachDB – Shared-Nothing Cluster (4 nodes)
  # Each node has its own isolated Docker volume.
  # No healthcheck needed here – db-init.sh owns
  # all timing via its own retry loops.
  # ─────────────────────────────────────────────
  roach1:
    image: cockroachdb/cockroach:v24.1.3
    command: >
      start
      --insecure
      --advertise-addr=roach1
      --listen-addr=0.0.0.0
      --join=roach1,roach2,roach3,roach4
      --cache=.25
      --max-sql-memory=.25
    volumes:
      - roach1-data:/cockroach/cockroach-data
    networks:
      - roachnet
    ports:
      - "26257:26257"
      - "8080:8080"
    restart: unless-stopped

  roach2:
    image: cockroachdb/cockroach:v24.1.3
    command: >
      start
      --insecure
      --advertise-addr=roach2
      --listen-addr=0.0.0.0
      --join=roach1,roach2,roach3,roach4
      --cache=.25
      --max-sql-memory=.25
    volumes:
      - roach2-data:/cockroach/cockroach-data
    networks:
      - roachnet
    restart: unless-stopped

  roach3:
    image: cockroachdb/cockroach:v24.1.3
    command: >
      start
      --insecure
      --advertise-addr=roach3
      --listen-addr=0.0.0.0
      --join=roach1,roach2,roach3,roach4
      --cache=.25
      --max-sql-memory=.25
    volumes:
      - roach3-data:/cockroach/cockroach-data
    networks:
      - roachnet
    restart: unless-stopped

  roach4:
    image: cockroachdb/cockroach:v24.1.3
    command: >
      start
      --insecure
      --advertise-addr=roach4
      --listen-addr=0.0.0.0
      --join=roach1,roach2,roach3,roach4
      --cache=.25
      --max-sql-memory=.25
    volumes:
      - roach4-data:/cockroach/cockroach-data
    networks:
      - roachnet
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # One-shot init: the script itself retries until
  # all nodes are reachable, inits the cluster,
  # waits for SQL, then loads the schema.
  # ─────────────────────────────────────────────
  # db-init:
  #   image: cockroachdb/cockroach:v24.1.3
  #   depends_on:
  #     - roach1
  #     - roach2
  #     - roach3
  #   volumes:
  #     - ./db:/db:ro
  #   entrypoint: ["/bin/bash", "/db/init.sh"]
  #   networks:
  #     - roachnet
  #   restart: "no"

  # ─────────────────────────────────────────────
  # Node.js / Express API
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: "postgresql://root@roach1:26257/discord_clone?sslmode=disable"
      PORT: "3001"
      DEMO_MAX_MESSAGES_PER_SERVER: "120"
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # lets backend kill/start nodes
    # depends_on:
    #   db-init:
    #     condition: service_completed_successfully
    networks:
      - roachnet
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # React frontend (Vite build → nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - roachnet
    restart: unless-stopped

volumes:
  roach1-data:
  roach2-data:
  roach3-data:
  roach4-data:

networks:
  roachnet:
    driver: bridge
